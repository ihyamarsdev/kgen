# Default values for {{ .AppName }}.
# This is a YAML-formatted file.

namespace: {{ .Namespace }}

replicaCount: {{ .ReplicaCount }}

image:
  repository: {{ .ImageRepository }}
  pullPolicy: IfNotPresent
  tag: "{{ .ImageTag }}"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: {{ .GenerateServiceAccount }}
  annotations: {}
  name: "{{ .ServiceAccountName }}"

podAnnotations: {}

{{- if eq .TemplateQuality "enterprise" }}
podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
{{- else if eq .TemplateQuality "production" }}
podSecurityContext: {}

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
{{- else }}
podSecurityContext: {}
securityContext: {}
{{- end }}

service:
  type: ClusterIP
  port: {{ .Port }}

{{- if .GenerateIngress }}
ingress:
  enabled: true
  className: ""
  annotations:
    {{- if .IngressTlsEnabled }}
    {{- if eq .IngressTlsProvider "cert-manager" }}
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    {{- end }}
    {{- end }}
  hosts:
    - host: {{ .AppName }}.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    {{- if .IngressTlsEnabled }}
    - secretName: "{{ .AppName }}-tls"
      hosts:
        - {{ .AppName }}.local
    {{- end }}
{{- end }}

{{- if .GenerateGateway }}
gateway:
  enabled: true
  name: "{{ .AppName }}-gateway"
  namespace: "{{ .Namespace }}"
  listenerName: "http"
  port: 80
  protocol: HTTP
  hostname: "{{ .AppName }}.local"
{{- end }}

{{- if .GenerateConfigMap }}
configMap:
  enabled: true
  data:
    APP_ENV: "production"
    LOG_LEVEL: "info"
{{- end }}

{{- if .GenerateSecret }}
secret:
  enabled: true
  data:
    DB_PASSWORD: "super-secret-password"
{{- end }}

{{- if .GenerateExternalSecret }}
externalSecret:
  enabled: true
  backend: "{{ .SecretBackend }}" # vault, aws, gcp, azure
  secretStoreName: "{{ .AppName }}-store"
  secretStoreKind: "SecretStore"
  refreshInterval: "1h"
  data:
    - secretKey: "DATABASE_URL"
      remoteKey: "prod/db/url"
      property: "connectionString"
{{- end }}

{{- if .GenerateSealedSecret }}
sealedSecret:
  enabled: true
  encryptedData:
    DB_PASSWORD: AgBw... # encrypted password placeholder
{{- end }}

autoscaling:
  enabled: {{ .HPAEnabled }}
  minReplicas: {{ .HPAMinReplicas }}
  maxReplicas: {{ .HPAMaxReplicas }}
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

{{- if .GenerateVPA }}
vpa:
  enabled: true
  updateMode: "Auto"
{{- end }}

{{- if .GenerateKEDA }}
keda:
  enabled: true
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-k8s.monitoring.svc.cluster.local:9090
        metricName: http_requests_total
        query: sum(rate(http_requests_total{job="{{ .AppName }}"}[2m]))
        threshold: '100'
{{- end }}

{{- if .GenerateServiceMonitor }}
serviceMonitor:
  enabled: true
  interval: "30s"
  path: "/metrics"
  port: "http"
{{- end }}

{{- if .GeneratePDB }}
pdb:
  enabled: true
  minAvailable: 1
{{- end }}

{{- if .GenerateStatefulSet }}
statefulset:
  serviceName: "{{ .AppName }}-headless"
  storageClass: "{{ .StorageClass }}"
  storageSize: "{{ .StorageSize }}"
{{- end }}

{{- if .GenerateCronJob }}
cronjob:
  schedule: "*/5 * * * *"
  concurrencyPolicy: "Forbid"
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 3
  command: ["/bin/sh", "-c", "echo task completed"]
{{- end }}

{{- if .GenerateArgoCD }}
argocd:
  enabled: true
  project: "default"
  repoURL: "https://github.com/ihyamarsdev/kgen-gitops.git"
  targetRevision: "HEAD"
  path: "charts/{{ .AppName }}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}

{{- if .GenerateIstio }}
istio:
  enabled: true
  gatewayName: "mesh"
  hosts:
    - "{{ .AppName }}.local"
{{- end }}

{{- if .GeneratePVC }}
pvc:
  enabled: true
  accessMode: "{{ .StorageAccessMode }}"
  size: "{{ .StorageSize }}"
  storageClass: "{{ .StorageClass }}"
{{- end }}

{{- if .GenerateNetworkPolicy }}
networkPolicy:
  enabled: true
  preset: "{{ .NetworkPolicyPreset }}" # defaultdeny, namespaceonly, custom
{{- end }}

{{- if .GeneratePriorityClass }}
priorityClass:
  enabled: true
{{- end }}

{{- if .GeneratePodMonitor }}
podMonitor:
  enabled: true
{{- end }}

{{- if .GeneratePrometheusRule }}
prometheusRule:
  enabled: true
{{- end }}

{{- if .GenerateGrafanaDashboard }}
grafanaDashboard:
  enabled: true
{{- end }}

{{- if .GenerateFlux }}
flux:
  enabled: true
{{- end }}

{{- if .GenerateRbac }}
rbac:
  create: true
  level: "{{ .RbacLevel }}" # readonly, admin, custom
  customResources:
    {{- range .RbacCustomResources }}
    - {{ . | quote }}
    {{- end }}
{{- end }}

{{- if eq .TemplateQuality "enterprise" }}
resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi
{{- else if eq .TemplateQuality "production" }}
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
{{- else }}
resources: {}
{{- end }}

nodeSelector: {}
tolerations: []
affinity:
{{- if .GeneratePodAntiAffinity }}
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - {{ .AppName }}
          topologyKey: kubernetes.io/hostname
{{- else }}
  {}
{{- end }}

topologySpreadConstraints:
{{- if .GenerateTopologySpreadConstraints }}
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: {{ .AppName }}
{{- else }}
  []
{{- end }}


{{- if or (eq .TemplateQuality "production") (eq .TemplateQuality "enterprise") }}
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
{{- else }}
livenessProbe: {}
readinessProbe: {}
{{- end }}